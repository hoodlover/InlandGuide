<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Apply saved (or system) theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem("icg-theme");
          var sysDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (t === "dark" || (!t && sysDark)) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./favicon-192.png" />
    <title>Inland Cutoff Guide</title>

    <!-- PWA -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#002D72" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cutoff Guide" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Keep production installable/offline, but never let its cache mask fresh
      // Vite modules while developing on localhost.
      if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
        window.addEventListener('load', function () {
          const isLocalDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
          if (isLocalDev) {
            navigator.serviceWorker.getRegistrations().then(function (registrations) {
              registrations.forEach(function (registration) { registration.unregister(); });
            }).catch(function () {});
          } else {
            navigator.serviceWorker.register('./sw.js').catch(function () {});
          }
        });
      }
    </script>
  </body>
</html>
