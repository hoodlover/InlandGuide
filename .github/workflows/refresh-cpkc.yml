name: Refresh CPKC port schedules

# Once daily: download the CPKC/CN port-schedule PDFs and inspect the
# published/last-updated dates printed in them. Only when a date or schedule
# actually changes do we rebuild the offline app, commit, and trigger Vercel.
#
# Resilience: a port that fails to parse keeps its last-good data and gets a
# `parseError` flag — the app shows a subtle pulsing "needs a pull" light rather
# than sending any alert. No notifications are sent from here.

on:
  # Once daily at 13:00 UTC (08:00 ET standard / 09:00 ET daylight).
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-cpkc
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so gen-version.mjs counts correctly

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install parser deps
        working-directory: scripts/refresh-cpkc
        run: npm ci

      # Exits non-zero only if EVERY port fails with no previous data to keep.
      # Partial failures still write the file (good ports updated, failed ports
      # kept + flagged) so the app can show the pulsing light.
      - name: Parse CPKC/CN PDFs
        working-directory: scripts/refresh-cpkc
        run: node refresh.mjs

      - name: Detect published schedule changes
        id: schedule_changes
        run: |
          if git diff --quiet -- frontend/src/data/cpkc-schedules.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Published dates and schedule data are unchanged."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "A published date or schedule changed."
          fi

      - name: Rebuild single-file offline app
        if: steps.schedule_changes.outputs.changed == 'true'
        working-directory: frontend
        run: |
          npm install --legacy-peer-deps
          node gen-version.mjs
          npm run build
          cp dist/index.html ../InlandCutoffGuide.html

      - name: Commit refreshed schedules + rebuilt app
        if: steps.schedule_changes.outputs.changed == 'true'
        run: |
          git config user.name "cpkc-refresh-bot"
          git config user.email "actions@github.com"
          git add frontend/src/data/cpkc-schedules.json frontend/src/version.json InlandCutoffGuide.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-refresh schedules + rebuild offline app"
            git push
          fi
